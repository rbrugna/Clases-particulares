<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda del Profesor | Clases Particulares</title>

    <meta name="description" content="Reservá clases particulares con la profesora Cynthia. Elegí día, hora y materia desde la web.">
    <meta name="author" content="Rosario Brugna">
    <meta name="keywords" content="clases particulares, profesora, matemática, física, química, reservas">
    <meta name="theme-color" content="#111"> 

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    <header class="site-header">
    <div class="header-wrap">
        <img src="img/logo.png" alt="Logo de Clases" class="logo-img">
        <h1>Profesora Cynthia</h1>
        <nav id="mainNav">
        <!-- nav adjusted by JS based on role -->
        </nav>
    </div>
    </header>


    <main class="container my-5">
        <section class="mb-5">
                <h2 class="text-center mb-4">Calendario y disponibilidad</h2>

                <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                        <button id="prevMonthProf" class="btn btn-sm">«</button>
                        <span id="mesAnioProf" class="mx-2"></span>
                        <button id="nextMonthProf" class="btn btn-sm">»</button>
                </div>
                <div><small>Click en un día para ver/añadir horarios</small></div>
                </div>

                <div id="calendarProf" class="mb-3"></div>

                <div id="timesWrapProf" style="display:none;">
                    <h3 class="mb-2">Horarios para <span id="fechaProfText"></span></h3>
                    <div id="timesListProf" class="d-flex flex-column gap-2 mb-3"></div>
                    <div class="d-flex gap-2">
                        <input id="nuevaHoraProf" type="time" class="form-control" style="max-width:160px;">
                        <button id="addTimeProf" class="btn btn-primary">Agregar hora para esta fecha</button>
                    </div>
                </div>

                <h2 class="text-center mb-4">Agregar horarios (por semana)</h2>

                <form id="form-turno" class="p-3">
        <div class="row g-3">
            <div class="col-md-6">
            <label for="dia" class="form-label">Día:</label>
            <select id="dia" class="form-select" required>
                <option value="">Seleccionar...</option>
                <option value="Lunes">Lunes</option>
                <option value="Martes">Martes</option>
                <option value="Miércoles">Miércoles</option>
                <option value="Jueves">Jueves</option>
                <option value="Viernes">Viernes</option>
            </select>
            </div>

            <div class="col-md-6">
            <label for="hora" class="form-label">Hora:</label>
            <input type="time" id="hora" class="form-control" required>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn">Agregar horario</button>
        </div>
        </form>
    </section>

    <section>
        <h2 class="text-center mb-4">Agenda completa</h2>

        <div class="table-responsive">
        <table class="table align-middle" id="tabla-turnos">
            <thead>
            <tr>
                <th>Día</th>
                <th>Hora</th>
                <th>Fecha</th>
                <th>Materia</th>
                <th>Alumno</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        </div>
    </section>
    </main>

    <div id="mensaje" class="mensaje"></div>


    <footer class="text-center py-3">
    <small>© 2025 - Profesora Particular</small>
    </footer>

    <script src="Js/agenda.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        (function(){
            const nav = document.getElementById('mainNav');
            const role = localStorage.getItem('role');
            const user = localStorage.getItem('username');
            if (!nav) return;
            if (role === 'profesora') {
                nav.innerHTML = `<a href="index.html">Inicio</a> <a href="agenda.html">Agenda del profesor</a> <a href="chat.html">Mensajes</a> <a href="#" id="logout">Cerrar sesión</a>`;
            } else {
                nav.innerHTML = `<a href="index.html">Inicio</a> <a href="reservar.html">Reservar</a> <a href="chat.html">Mensajes</a> <a href="#" id="logout">Cerrar sesión</a>`;
            }
            const logout = document.getElementById('logout');
            if (logout) logout.addEventListener('click', ()=>{ localStorage.removeItem('role'); localStorage.removeItem('username'); window.location.href='index.html'; });
        })();
        </script>
</body>
</html>
