<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Clase | Clases Particulares</title>

    <meta name="description" content="Reservá clases particulares con la profesora Cynthia. Elegí día, hora y materia desde la web.">
    <meta name="author" content="Rosario Brugna">
    <meta name="keywords" content="clases particulares, profesora, matemática, física, química, reservas">
    <meta name="theme-color" content="#111"> 

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="site-header">
    <div class="header-wrap">
        <img src="img/logo.png" alt="Logo de Clases" class="logo-img">
        <h1>Profesora Cynthia</h1>
        <nav id="mainNav">
        <!-- nav adjusted by JS based on role -->
        </nav>
    </div>
    </header>

    <main class="container my-5">
    <section class="mb-5">
        <h2 class="text-center mb-4">Elige fecha en el calendario</h2>

        <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-2">
            <button id="prevMonth" class="btn btn-sm">«</button>
            <select id="monthSelect" class="form-select form-select-sm" style="width:140px;"></select>
            <select id="yearSelect" class="form-select form-select-sm" style="width:100px;"></select>
            <button id="nextMonth" class="btn btn-sm">»</button>
            <span id="mesAnio" class="mx-2 visually-hidden"></span>
        </div>
        <div><small>Los días en azul tienen turnos disponibles</small></div>
        </div>

        <div id="calendar" class="mb-3"></div>

        <div id="timesWrap" style="display:none;">
        <h3 class="mb-2">Horarios disponibles para <span id="fechaSeleccionadaText"></span></h3>
        <div id="timesList" class="d-flex flex-column gap-2"></div>
        </div>
    </section>

    <section>
        <h2 class="text-center mb-4">Completa tu reserva</h2>

        <form id="form-reserva" class="p-3">
        <div class="row g-3">
            <div class="col-md-6">
            <label for="nombreAlumno" class="form-label">Tu nombre:</label>
            <input type="text" id="nombreAlumno" class="form-control" required>
            </div>

            <div class="col-md-6">
            <label for="materiaAlumno" class="form-label">Materia que querés aprender:</label>
            <input type="text" id="materiaAlumno" class="form-control" required>
            </div>
        </div>

        <input type="hidden" id="indiceTurno">
        <input type="hidden" id="fechaReserva">
        <input type="hidden" id="horaSeleccionada">
        <input type="hidden" id="diaSeleccionado">

        <div class="text-center mt-3">
            <p>Horario seleccionado: <span id="seleccion">—</span></p>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn">Confirmar reserva</button>
        </div>
        </form>
    </section>
    </main>

    <div id="mensaje" class="mensaje"></div>

    <footer class="text-center py-3">
    <small>© 2025 - Sitio de Clases Particulares</small>
    </footer>

    <script src="Js/reservar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        (function(){
            const nav = document.getElementById('mainNav');
            const role = localStorage.getItem('role');
            const user = localStorage.getItem('username');
            if (!nav) return;
            if (role === 'alumno') {
                nav.innerHTML = `<a href="index.html">Inicio</a> <a href="reservar.html">Reservar</a> <a href="chat.html">Mensajes</a> <a href="#" id="logout">Cerrar sesión (${user||'Alumno'})</a>`;
            } else {
                nav.innerHTML = `<a href="index.html">Inicio</a> <a href="agenda.html">Agenda del profesor</a> <a href="chat.html">Mensajes</a> <a href="#" id="logout">Cerrar sesión</a>`;
            }
            const logout = document.getElementById('logout');
            if (logout) logout.addEventListener('click', ()=>{ localStorage.removeItem('role'); localStorage.removeItem('username'); window.location.href='index.html'; });
        })();
        </script>
</body>
</html>
