<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mensajes | Clases</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
  <div class="header-wrap">
    <img src="img/logo.png" alt="Logo" class="logo-img">
    <h1>Profesora Cynthia</h1>
    <nav id="mainNav"></nav>
  </div>
  </header>

  <main class="container my-5">
    <h2 class="text-center mb-4">Mensajes privados</h2>
    <div id="chatRoot">
      <!-- professor: list of students left + chat right. student: only their thread -->
    </div>
  </main>

  <footer class="text-center py-3"><small>© 2025 - Mensajes</small></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="Js/chat-firebase.js"></script>
  <script>
  (function(){
    const nav = document.getElementById('mainNav');
    const role = localStorage.getItem('role');
    const user = localStorage.getItem('username');
    if (!nav) return;
    if (role === 'alumno') nav.innerHTML = `<a href="index.html">Inicio</a> <a href="reservar.html">Reservar</a> <a href="#" id="logout">Cerrar sesión (${user||'Alumno'})</a>`;
    else if (role === 'profesora') nav.innerHTML = `<a href="index.html">Inicio</a> <a href="agenda.html">Agenda del profesor</a> <a href="#" id="logout">Cerrar sesión</a>`;
    else nav.innerHTML = `<a href="index.html">Inicio</a> <a href="reservar.html">Reservar</a>`;
    const logout = document.getElementById('logout'); if (logout) logout.addEventListener('click', ()=>{ localStorage.removeItem('role'); localStorage.removeItem('username'); window.location.href='index.html'; });
  })();
  </script>
</body>
</html>
